<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>眼视光光学 · 复习卡片</title>
<style>
  :root {
    --bg: #0f172a;
    --card-bg: #1e293b;
    --card-front: #1e293b;
    --card-back: #1e293b;
    --text: #e2e8f0;
    --text-secondary: #94a3b8;
    --accent: #38bdf8;
    --accent-dim: #0c4a6e;
    --correct: #34d399;
    --correct-dim: #064e3b;
    --wrong: #f87171;
    --wrong-dim: #450a0a;
    --border: #334155;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  .header { text-align: center; margin-bottom: 24px; }
  .header h1 {
    font-size: 1.8rem; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent; background-clip: text;
  }
  .header .subtitle {
    font-size: 0.85rem; color: var(--text-secondary);
    margin-top: 6px; line-height: 1.5;
  }

  .section-pills {
    display: flex; gap: 8px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 16px;
  }
  .pill {
    padding: 6px 16px; border-radius: 20px; font-size: 0.8rem;
    font-weight: 600; cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--text-secondary);
    transition: all 0.2s; font-family: inherit;
  }
  .pill.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
  .pill .count { color: var(--text-secondary); font-weight: 400; }

  .stats-bar {
    display: flex; gap: 20px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 20px;
  }
  .stat {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 20px; text-align: center; min-width: 80px;
  }
  .stat .val { font-size: 1.4rem; font-weight: 700; }
  .stat .lbl { font-size: 0.75rem; color: var(--text-secondary); }
  .stat.remain .val { color: var(--accent); }
  .stat.mastered .val { color: var(--correct); }
  .stat.review .val { color: #fbbf24; }

  .card-container {
    perspective: 1000px; width: 100%; max-width: 520px;
    margin-bottom: 20px; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .card {
    position: relative; width: 100%; min-height: 260px;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d; border-radius: 20px; box-shadow: var(--shadow);
  }
  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border-radius: 20px; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 30px; border: 1px solid var(--border);
  }
  .card-front { background: var(--card-bg); }
  .card-back { background: var(--card-bg); transform: rotateY(180deg); }

  .card .term {
    font-size: 1.8rem; font-weight: 800; text-align: center;
    letter-spacing: 0.02em; word-break: break-word;
  }
  .card .hint { font-size: 0.8rem; color: var(--text-secondary); margin-top: 12px; }
  .card .definition {
    font-size: 1.15rem; line-height: 1.7; text-align: center; color: #cbd5e1;
  }
  .card .lang-tag {
    position: absolute; top: 16px; right: 20px;
    font-size: 0.7rem; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.1em;
  }

  .card-index { margin-bottom: 12px; font-size: 0.85rem; color: var(--text-secondary); }

  .actions {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px;
  }
  .btn {
    border: none; border-radius: 12px; padding: 14px 28px;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
  }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  .btn-back { background: var(--card-bg); color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-back:hover { background: var(--border); }
  .btn-forgot { background: var(--wrong-dim); color: var(--wrong); border: 1px solid #7f1d1d; }
  .btn-forgot:hover { background: #7f1d1d; }
  .btn-remember { background: var(--correct-dim); color: var(--correct); border: 1px solid #065f46; }
  .btn-remember:hover { background: #065f46; }
  .btn-flip { background: var(--accent-dim); color: var(--accent); border: 1px solid #0e7490; }
  .btn-flip:hover { background: #0e7490; }
  .btn-secondary { background: var(--card-bg); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-small { padding: 8px 16px; font-size: 0.85rem; border-radius: 8px; }

  .progress-wrap {
    width: 100%; max-width: 520px; background: var(--border);
    border-radius: 10px; height: 8px; margin-bottom: 28px; overflow: hidden;
  }
  .progress-bar {
    height: 100%; border-radius: 10px;
    background: linear-gradient(90deg, var(--accent), #818cf8);
    transition: width 0.4s ease;
  }

  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 10px; }

  .word-list {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 100; align-items: center; justify-content: center;
  }
  .word-list.open { display: flex; }
  .word-list-inner {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; max-width: 640px; width: 90%; max-height: 80vh;
    display: flex; flex-direction: column;
  }
  .word-list-inner h3 { margin-bottom: 12px; font-size: 1.1rem; }
  .word-list-search {
    width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 0.9rem;
    font-family: inherit; margin-bottom: 12px; outline: none;
  }
  .word-list-search:focus { border-color: var(--accent); }
  .word-list-header {
    display: grid; grid-template-columns: 40px 1fr 1fr; gap: 12px;
    padding: 8px 0; font-size: 0.8rem; color: var(--text-secondary);
    border-bottom: 1px solid var(--border); font-weight: 600;
  }
  .word-list-body { overflow-y: auto; max-height: 55vh; }
  .word-row {
    display: grid; grid-template-columns: 40px 1fr 1fr; gap: 12px;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    font-size: 0.9rem; align-items: center;
  }
  .word-row.mastered { opacity: 0.6; }
  .word-row .status-cell { text-align: center; font-size: 0.85rem; }
  .word-row .front-cell { font-weight: 600; color: var(--accent); word-break: break-word; }
  .word-row .back-cell { color: var(--text-secondary); word-break: break-word; }
  .word-list-summary { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; }
  .no-match { text-align: center; color: var(--text-secondary); padding: 20px; }

  @media (max-width: 480px) {
    .card { min-height: 200px; }
    .card .term { font-size: 1.4rem; }
    .card .definition { font-size: 1rem; }
    .btn { padding: 12px 20px; font-size: 0.9rem; }
    .actions { gap: 8px; }
    .word-list-inner { padding: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>👁️ 眼视光光学 · 复习卡片</h1>
  <p class="subtitle">点击卡片翻转 · 选择「记得」或「忘了」追踪进度 · 键盘快捷键操作</p>
</div>

<div class="section-pills">
  <button class="pill active" data-section="all">全部词汇 <span class="count" id="count-all"></span></button>
  <button class="pill" data-section="en-cn">英译汉 <span class="count" id="count-en-cn"></span></button>
  <button class="pill" data-section="cn-def">名词解释 <span class="count" id="count-cn-def"></span></button>
</div>

<div class="stats-bar">
  <div class="stat remain"><div class="val" id="stat-remain">0</div><div class="lbl">剩余</div></div>
  <div class="stat mastered"><div class="val" id="stat-mastered">0</div><div class="lbl">已掌握</div></div>
  <div class="stat review"><div class="val" id="stat-review">0</div><div class="lbl">待复习</div></div>
</div>

<div class="progress-wrap">
  <div class="progress-bar" id="progress-bar" style="width:0%"></div>
</div>

<div class="card-index" id="card-index">准备开始...</div>

<div class="card-container" id="card-container" onclick="flipCard()">
  <div class="card" id="card">
    <div class="card-face card-front">
      <span class="lang-tag" id="front-tag"></span>
      <div class="term" id="front-text">—</div>
      <div class="hint">👆 点击翻转查看</div>
    </div>
    <div class="card-face card-back">
      <span class="lang-tag" id="back-tag"></span>
      <div class="definition" id="back-text">—</div>
    </div>
  </div>
</div>

<div class="actions">
  <button class="btn btn-back" onclick="goBack()" id="btn-back">⬆ 上一个</button>
  <button class="btn btn-forgot" onclick="markForgot()" id="btn-forgot">😕 忘了</button>
  <button class="btn btn-flip" onclick="flipCard()">🔄 翻转</button>
  <button class="btn btn-remember" onclick="markRemembered()" id="btn-remember">✅ 记得</button>
</div>

<div class="toolbar">
  <button class="btn btn-secondary btn-small" onclick="shuffleAll()">🔀 打乱重来</button>
  <button class="btn btn-secondary btn-small" onclick="reviewForgotten()">📝 复习遗忘词</button>
  <button class="btn btn-secondary btn-small" onclick="toggleWordList()">📋 词汇表</button>
  <button class="btn btn-secondary btn-small" onclick="resetAll()">🔄 全部重置</button>
</div>

<div class="word-list" id="word-list-modal" onclick="if(event.target===this) toggleWordList()">
  <div class="word-list-inner">
    <h3>📋 词汇表</h3>
    <input type="text" class="word-list-search" id="word-list-search" placeholder="🔍 搜索词汇..." autocomplete="off">
    <div class="word-list-summary" id="word-list-summary"></div>
    <div class="word-list-header">
      <span>状态</span>
      <span>术语</span>
      <span>释义</span>
    </div>
    <div class="word-list-body" id="word-list-body"></div>
  </div>
</div>

// ── STATE ──
let currentSection = 'all';
let words = [...ALL_WORDS];
let queue = [];
let mastered = new Set();
let forgotten = new Set();
let currentIdx = -1;
let currentWordIdx = -1;
let isFlipped = false;
let animating = false;
let historyStack = [];

// ── DOM refs ──
const cardContainer = document.getElementById('card-container');
const cardEl = document.getElementById('card');
const frontText = document.getElementById('front-text');
const backText = document.getElementById('back-text');
const frontTag = document.getElementById('front-tag');
const backTag = document.getElementById('back-tag');
const cardIndex = document.getElementById('card-index');
const progressBar = document.getElementById('progress-bar');
const statRemain = document.getElementById('stat-remain');
const statMastered = document.getElementById('stat-mastered');
const statReview = document.getElementById('stat-review');
const wordListModal = document.getElementById('word-list-modal');
const wordListBody = document.getElementById('word-list-body');
const wordListSearch = document.getElementById('word-list-search');
const wordListSummary = document.getElementById('word-list-summary');
const btnForgot = document.getElementById('btn-forgot');
const btnRemember = document.getElementById('btn-remember');
const btnBack = document.getElementById('btn-back');

// ── Section counts ──
document.getElementById('count-all').textContent = '(' + ALL_WORDS.length + ')';
document.getElementById('count-en-cn').textContent = '(' + ALL_WORDS.filter(w => w.section === 'en-cn').length + ')';
document.getElementById('count-cn-def').textContent = '(' + ALL_WORDS.filter(w => w.section === 'cn-def').length + ')';

function getFilteredWords() {
  if (currentSection === 'all') return [...ALL_WORDS];
  return ALL_WORDS.filter(w => w.section === currentSection);
}

function buildQueue() {
  queue = words.map(function(_, i) { return i; });
  shuffle(queue);
  currentIdx = 0;
  currentWordIdx = queue.length > 0 ? queue[0] : -1;
  isFlipped = false;
  animating = false;
  historyStack = [];
  cardEl.classList.remove('flipped');
  updateCard();
  updateStats();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function updateCard() {
  if (currentWordIdx === -1 || queue.length === 0 || currentIdx >= queue.length) {
    frontText.textContent = '\u{1f389}';
    backText.textContent = '全部复习完毕！';
    frontTag.textContent = '';
    backTag.textContent = '';
    cardIndex.textContent = '已完成';
    btnForgot.disabled = true;
    btnRemember.disabled = true;
    btnBack.disabled = true;
    progressBar.style.width = '100%';
    statRemain.textContent = '0';
    return;
  }
  btnForgot.disabled = false;
  btnRemember.disabled = false;
  btnBack.disabled = historyStack.length === 0;
  const w = words[currentWordIdx];
  frontText.textContent = w.front;
  backText.textContent = w.back;

  if (w.section === 'en-cn') {
    frontTag.textContent = 'English';
    backTag.textContent = '中文';
  } else {
    frontTag.textContent = '术语';
    backTag.textContent = '释义';
  }

  cardIndex.textContent = '第 ' + (currentIdx + 1) + ' / ' + queue.length + ' 个';
  updateStats();
}

function flipCard() {
  if (queue.length === 0 || currentWordIdx === -1) return;
  if (animating) return;
  isFlipped = !isFlipped;
  cardEl.classList.toggle('flipped', isFlipped);
}

function markRemembered() {
  if (queue.length === 0 || currentWordIdx === -1 || animating) return;
  historyStack.push({ idx: currentIdx, wordIdx: currentWordIdx, qlen: queue.length, wasMastered: mastered.has(currentWordIdx), wasForgotten: forgotten.has(currentWordIdx) });
  mastered.add(currentWordIdx);
  forgotten.delete(currentWordIdx);
  advanceCard();
}

function markForgot() {
  if (queue.length === 0 || currentWordIdx === -1 || animating) return;
  historyStack.push({ idx: currentIdx, wordIdx: currentWordIdx, qlen: queue.length, wasMastered: mastered.has(currentWordIdx), wasForgotten: forgotten.has(currentWordIdx) });
  mastered.delete(currentWordIdx);
  forgotten.add(currentWordIdx);
  queue.push(currentWordIdx);
  advanceCard();
}

function goBack() {
  if (historyStack.length === 0 || animating) return;
  var last = historyStack.pop();
  forgotten.delete(last.wordIdx);
  mastered.delete(last.wordIdx);
  if (last.wasMastered) mastered.add(last.wordIdx);
  if (last.wasForgotten) forgotten.add(last.wordIdx);

  if (queue.length > last.qlen) {
    queue.splice(last.qlen, 1);
  }
  currentIdx = last.idx;
  currentWordIdx = last.wordIdx;
  isFlipped = false;
  cardEl.classList.remove('flipped');
  updateCard();
  updateStats();
}

function advanceCard() {
  var wasFlipped = isFlipped;
  currentIdx++;

  if (currentIdx >= queue.length) {
    if (forgotten.size > 0) {
      queue = Array.from(forgotten);
      shuffle(queue);
      forgotten.clear();
      currentIdx = 0;
    } else if (mastered.size >= words.length) {
      currentWordIdx = -1;
      queue = [];
      currentIdx = -1;
    } else {
      var unmastered = words.map(function(_, i) { return i; }).filter(function(i) { return !mastered.has(i); });
      if (unmastered.length === 0) {
        currentWordIdx = -1;
        queue = [];
        currentIdx = -1;
      } else {
        queue = unmastered;
        shuffle(queue);
        currentIdx = 0;
      }
    }
  }

  isFlipped = false;
  cardEl.classList.remove('flipped');
  var scheduledIdx = currentIdx;

  if (wasFlipped) {
    animating = true;
    btnForgot.disabled = true;
    btnRemember.disabled = true;
    btnBack.disabled = true;
    setTimeout(function() {
      animating = false;
      if (currentIdx === scheduledIdx) {
        currentWordIdx = queue.length > 0 && currentIdx < queue.length ? queue[currentIdx] : -1;
        updateCard();
      }
    }, 500);
  } else {
    currentWordIdx = queue.length > 0 && currentIdx < queue.length ? queue[currentIdx] : -1;
    updateCard();
  }
}

function updateStats() {
  var remain = queue.length > 0 && currentIdx < queue.length ? queue.length - currentIdx : 0;
  statRemain.textContent = remain;
  statMastered.textContent = mastered.size;
  statReview.textContent = forgotten.size;
  var total = words.length;
  var done = total > 0 ? mastered.size : 0;
  progressBar.style.width = total > 0 ? Math.round((done / total) * 100) + '%' : '0%';
}

function shuffleAll() {
  words = getFilteredWords();
  mastered.clear();
  forgotten.clear();
  buildQueue();
}

function reviewForgotten() {
  if (animating) return;
  if (forgotten.size === 0) {
    var candidates = words.map(function(_, i) { return i; }).filter(function(i) { return !mastered.has(i); });
    if (candidates.length === 0) {
      alert('所有词汇都已掌握！');
      return;
    }
    queue = candidates;
    shuffle(queue);
  } else {
    queue = Array.from(forgotten);
    shuffle(queue);
    forgotten.clear();
  }
  currentIdx = 0;
  currentWordIdx = queue[0];
  isFlipped = false;
  cardEl.classList.remove('flipped');
  updateCard();
}

function resetAll() {
  if (animating) return;
  words = getFilteredWords();
  mastered.clear();
  forgotten.clear();
  buildQueue();
}

// ── Word list with search ──
function renderWordList() {
  var filtered = getFilteredWords();
  var searchTerm = wordListSearch.value.toLowerCase().trim();

  var summary = '共 ' + filtered.length + ' 个';
  if (searchTerm) {
    var matched = filtered.filter(function(w) {
      return w.front.toLowerCase().includes(searchTerm) || w.back.toLowerCase().includes(searchTerm);
    });
    summary += ' · 搜索到 ' + matched.length + ' 个';
  }
  wordListSummary.textContent = summary;

  var html = '';
  var count = 0;
  filtered.forEach(function(w, i) {
    if (searchTerm) {
      if (!w.front.toLowerCase().includes(searchTerm) && !w.back.toLowerCase().includes(searchTerm)) return;
    }
    count++;
    var statusIcon = '○';
    var statusClass = '';
    if (mastered.has(i)) {
      statusIcon = '✅';
      statusClass = ' mastered';
    } else if (forgotten.has(i)) {
      statusIcon = '🔄';
    }
    html += '<div class="word-row' + statusClass + '">';
    html += '<span class="status-cell">' + statusIcon + '</span>';
    html += '<span class="front-cell">' + w.front + '</span>';
    html += '<span class="back-cell">' + w.back + '</span>';
    html += '</div>';
  });

  if (count === 0) {
    html = '<div class="no-match">未找到匹配词汇</div>';
  }
  wordListBody.innerHTML = html;
}

function toggleWordList() {
  var isOpen = wordListModal.classList.contains('open');
  if (isOpen) {
    wordListModal.classList.remove('open');
  } else {
    wordListSearch.value = '';
    renderWordList();
    wordListModal.classList.add('open');
    setTimeout(function() { wordListSearch.focus(); }, 100);
  }
}

wordListSearch.addEventListener('input', function() {
  renderWordList();
});

// ── Section switch ──
document.querySelectorAll('.pill').forEach(function(pill) {
  pill.addEventListener('click', function() {
    if (animating) return;
    document.querySelectorAll('.pill').forEach(function(p) { p.classList.remove('active'); });
    pill.classList.add('active');
    currentSection = pill.dataset.section;
    resetAll();
  });
});

// ── Keyboard shortcuts ──
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
  if (animating) return;
  switch (e.key) {
    case ' ': case 'Enter':
      e.preventDefault();
      flipCard();
      break;
    case 'ArrowLeft':
      markForgot();
      break;
    case 'ArrowRight':
      markRemembered();
      break;
    case 'ArrowUp':
      goBack();
      break;
    case 'r':
      resetAll();
      break;
    case 'f':
      reviewForgotten();
      break;
  }
});

// ── Init ──
words = getFilteredWords();
buildQueue();
</script>
</body>
</html>
