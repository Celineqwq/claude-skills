<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>组织学与胚胎学 · 复习卡片</title>
<style>
:root {
  --bg: #0f172a;
  --card-bg: #1e293b;
  --text: #e2e8f0;
  --text-secondary: #94a3b8;
  --accent: #3b82f6;
  --correct: #22c55e;
  --wrong: #ef4444;
  --border: #334155;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
}
.container {
  width: 100%;
  max-width: 700px;
  margin: 0 auto;
}
/* Header */
.header { text-align: center; margin-bottom: 20px; }
.header h1 { font-size: 1.5rem; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
.header .subtitle { font-size: 0.8rem; color: var(--text-secondary); }
.header .subtitle span { opacity: 0.8; }
/* Stats */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 14px 10px;
  text-align: center;
  border: 1px solid var(--border);
}
.stat-card .num { font-size: 1.6rem; font-weight: 800; }
.stat-card .label { font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px; }
.stat-card.remaining .num { color: var(--accent); }
.stat-card.mastered .num { color: var(--correct); }
.stat-card.forgotten .num { color: #fbbf24; }
/* Progress bar */
.progress-wrap {
  background: var(--card-bg);
  border-radius: 999px;
  height: 8px;
  margin-bottom: 16px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--correct));
  border-radius: 999px;
  transition: width 0.5s ease;
  width: 0%;
}
/* Section pills */
.section-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 16px;
}
.pill {
  padding: 6px 16px;
  border-radius: 999px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}
.pill:hover { border-color: var(--accent); color: var(--text); }
.pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
/* Card */
.card-wrapper {
  perspective: 1000px;
  margin-bottom: 16px;
  cursor: pointer;
}
.card {
  background: var(--card-bg);
  border-radius: 16px;
  border: 1px solid var(--border);
  min-height: 280px;
  position: relative;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
}
.card.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 30px;
  border-radius: 16px;
}
.card-back {
  transform: rotateY(180deg);
}
.card-index {
  position: absolute;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.75rem;
  color: var(--text-secondary);
}
/* Card text styles */
.term {
  font-size: 1.8rem;
  font-weight: 800;
  color: #cbd5e1;
  text-align: center;
  line-height: 1.4;
  word-break: break-word;
}
.definition {
  font-size: 1.15rem;
  line-height: 1.7;
  color: #cbd5e1;
  text-align: center;
  word-break: break-word;
}
/* Buttons */
.actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.btn {
  padding: 10px 20px;
  border-radius: 12px;
  border: 1px solid var(--border);
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--card-bg);
  color: var(--text);
  min-width: 80px;
  text-align: center;
}
.btn:hover { opacity: 0.85; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-back { color: var(--text-secondary); }
.btn-back:hover { color: var(--text); border-color: var(--text-secondary); }
.btn-forgot { border-color: var(--wrong); color: var(--wrong); }
.btn-forgot:hover { background: var(--wrong); color: #fff; }
.btn-remember { border-color: var(--correct); color: var(--correct); }
.btn-remember:hover { background: var(--correct); color: #fff; }
.btn-flip { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-flip:hover { background: #2563eb; }
/* Bottom toolbar */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-top: 8px;
}
.toolbar .btn { font-size: 0.8rem; padding: 8px 16px; min-width: auto; }
/* Done state */
.done {
  text-align: center;
  padding: 60px 20px;
}
.done h2 { font-size: 2rem; color: var(--correct); margin-bottom: 12px; }
.done p { color: var(--text-secondary); margin-bottom: 24px; }
/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card-bg);
  border-radius: 16px;
  border: 1px solid var(--border);
  width: 100%;
  max-width: 600px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-header h3 { font-size: 1.1rem; }
.modal-close {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 1.4rem;
  cursor: pointer;
  padding: 4px;
}
.modal-close:hover { color: var(--text); }
.modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
.modal-search {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: #0f172a;
  color: var(--text);
  font-size: 0.9rem;
  margin-bottom: 12px;
  outline: none;
}
.modal-search:focus { border-color: var(--accent); }
.word-list-header {
  display: grid;
  grid-template-columns: 40px 1fr 1fr;
  gap: 12px;
  padding: 8px 4px;
  font-size: 0.75rem;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.word-list {
  max-height: 55vh;
  overflow-y: auto;
}
.word-row {
  display: grid;
  grid-template-columns: 40px 1fr 1fr;
  gap: 12px;
  padding: 8px 4px;
  border-bottom: 1px solid rgba(51,65,85,0.4);
  font-size: 0.85rem;
  align-items: center;
}
.word-row.mastered { opacity: 0.6; }
.word-row .status { text-align: center; font-size: 0.9rem; }
.word-row .word-front { color: var(--text); }
.word-row .word-back { color: var(--text-secondary); }
.no-match { text-align: center; padding: 30px; color: var(--text-secondary); }
.list-summary { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 8px; }
@media (max-width: 500px) {
  .card { min-height: 220px; }
  .term { font-size: 1.4rem; }
  .definition { font-size: 1rem; }
  .stats { gap: 6px; }
  .stat-card { padding: 10px 6px; }
  .stat-card .num { font-size: 1.2rem; }
  .btn { padding: 8px 14px; font-size: 0.8rem; min-width: 60px; }
}
</style>
</head>

<div class="container">
  <div class="header">
    <h1>📚 组织学与胚胎学</h1>
    <div class="subtitle"><span>点击卡片翻转 · 选择记得或忘了追踪进度 · 键盘快捷键操作</span></div>
  </div>

  <div class="stats">

    </div>
    <div class="stat-card forgotten">

      <div class="label">待复习</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="section-pills" id="pills">
    <div class="pill active" data-section="all">全部 (294)</div>
    <div class="pill" data-section="en-cn">英译汉 (278)</div>
    <div class="pill" data-section="cn-def">名词解释 (16)</div>
  </div>

  <div class="card-wrapper" id="cardWrapper">
    <div class="card" id="card">
      <div class="card-face card-front">
        <div class="card-index" id="cardIndex">第 0 / 0 个</div>
        <div class="term" id="frontText">加载中...</div>
      </div>
      <div class="card-face card-back">
        <div class="card-index">背面</div>
        <div class="definition" id="backText">加载中...</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-back" id="btnBack" title="上一个词 (↑)">⬆ 上一个</button>
    <button class="btn btn-forgot" id="btnForgot" title="忘了 (←)">😕 忘了</button>
    <button class="btn btn-flip" id="btnFlip" title="翻转 (Space/Enter)">🔄 翻转</button>
    <button class="btn btn-remember" id="btnRemember" title="记得 (→)">✅ 记得</button>
  </div>

  <div class="toolbar">
    <button class="btn" id="btnShuffle">🔀 打乱重来</button>
    <button class="btn" id="btnReview">📝 复习遗忘词</button>
    <button class="btn" id="btnWordList">📋 词汇表</button>
    <button class="btn" id="btnReset">🔄 全部重置</button>
  </div>

  <div id="doneView" class="done" style="display:none">
    <h2>🎉 全部复习完毕！</h2>
    <p>太棒了！你已经掌握了当前分组的所有卡片 ~</p>
    <button class="btn btn-flip" onclick="resetAll()">🔄 重新开始</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="wordListModal">
  <div class="modal">
    <div class="modal-header">
      <h3>📋 词汇表</h3>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body">
      <input type="text" class="modal-search" id="wordSearch" placeholder="🔍 搜索词汇..." autocomplete="off">
      <div class="list-summary" id="listSummary"></div>
      <div class="word-list-header">
        <span>状态</span>
        <span>术语</span>
        <span>释义</span>
      </div>
      <div class="word-list" id="wordListContainer"></div>
    </div>
  </div>
</div>

// 状态变量
var currentSection = 'all';
var filteredIndices = [];
var queue = [];
var currentIdx = 0;
var currentWordIdx = -1;
var isFlipped = false;
var mastered = new Set();
var forgotten = new Set();
var historyStack = [];
var animating = false;

// DOM 引用
var card = document.getElementById('card');
var frontText = document.getElementById('frontText');
var backText = document.getElementById('backText');
var cardIndex = document.getElementById('cardIndex');
var remainingCount = document.getElementById('remainingCount');
var masteredCount = document.getElementById('masteredCount');
var forgottenCount = document.getElementById('forgottenCount');
var progressBar = document.getElementById('progressBar');
var doneView = document.getElementById('doneView');
var cardWrapper = document.getElementById('cardWrapper');

function getSectionIndices(section) {
  if (section === 'all') return ALL_WORDS.map(function(_, i) { return i; });
  return ALL_WORDS.reduce(function(acc, w, i) {
    if (w.section === section) acc.push(i);
    return acc;
  }, []);
}

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i];
    arr[i] = arr[j];
    arr[j] = tmp;
  }
  return arr;
}

function initQueue(section) {
  filteredIndices = getSectionIndices(section);
  queue = shuffle(filteredIndices.slice());
  currentIdx = 0;
  currentWordIdx = queue.length > 0 ? queue[0] : -1;
  isFlipped = false;
  card.classList.remove('flipped');
  mastered = new Set();
  forgotten = new Set();
  historyStack = [];
}

function getCard(i) {
  if (i >= 0 && i < ALL_WORDS.length) return ALL_WORDS[i];
  return null;
}

function updateCard() {
  if (currentWordIdx >= 0 && currentWordIdx < ALL_WORDS.length) {
    var word = ALL_WORDS[currentWordIdx];
    frontText.textContent = word.front;
    backText.textContent = word.back;
    cardIndex.textContent = '第 ' + (currentIdx + 1) + ' / ' + queue.length + ' 个';
  }
}

function updateStats() {
  var total = filteredIndices.length;
  var remaining = queue.length - currentIdx;
  remainingCount.textContent = remaining;
  masteredCount.textContent = mastered.size;
  forgottenCount.textContent = forgotten.size;
  var pct = total > 0 ? Math.round(mastered.size / total * 100) : 0;
  progressBar.style.width = pct + '%';
}

function advanceCard() {
  currentIdx++;
  if (currentIdx >= queue.length) {
    if (forgotten.size > 0) {
      var reviewList = [];
      forgotten.forEach(function(idx) { reviewList.push(idx); });
      queue = shuffle(reviewList);
      currentIdx = 0;
      currentWordIdx = queue[0];
    } else {
      doneView.style.display = 'block';
      cardWrapper.style.display = 'none';
      updateStats();
      return;
    }
  } else {
    currentWordIdx = queue[currentIdx];
  }
  isFlipped = false;
  card.classList.remove('flipped');
  updateCard();
  updateStats();
}

function markForgot() {
  if (queue.length === 0 || currentWordIdx === -1 || animating) return;
  historyStack.push({ idx: currentIdx, wordIdx: currentWordIdx, qlen: queue.length });
  mastered.delete(currentWordIdx);
  forgotten.add(currentWordIdx);
  // 暂时移出队列中的当前位置，重新追加到末尾
  var wi = queue.splice(currentIdx, 1)[0];
  queue.push(wi);
  // currentIdx 不变，但 queue 变了，重新映射
  currentWordIdx = queue[currentIdx];
  isFlipped = false;
  card.classList.remove('flipped');
  updateCard();
  updateStats();
}

function markRemembered() {
  if (queue.length === 0 || currentWordIdx === -1 || animating) return;
  historyStack.push({ idx: currentIdx, wordIdx: currentWordIdx, qlen: queue.length });
  mastered.add(currentWordIdx);
  forgotten.delete(currentWordIdx);
  advanceCard();
}

function goBack() {
  if (historyStack.length === 0 || animating) return;
  var last = historyStack.pop();
  forgotten.delete(last.wordIdx);
  mastered.delete(last.wordIdx);
  // 恢复状态
  currentIdx = last.idx;
  currentWordIdx = last.wordIdx;
  isFlipped = false;
  card.classList.remove('flipped');
  updateCard();
  updateStats();
  doneView.style.display = 'none';
  cardWrapper.style.display = 'block';
}

function switchSection(section) {
  currentSection = section;
  document.querySelectorAll('.pill').forEach(function(p) {
    p.classList.toggle('active', p.dataset.section === section);
  });
  initQueue(section);
  updateCard();
  updateStats();
  doneView.style.display = 'none';
  cardWrapper.style.display = 'block';
  updatePillCounts();
}

function updatePillCounts() {
  document.querySelectorAll('.pill').forEach(function(p) {
    var sec = p.dataset.section;
    if (sec === 'all') {
      p.textContent = '全部 (' + ALL_WORDS.length + ')';
    } else {
      var cnt = ALL_WORDS.filter(function(w) { return w.section === sec; }).length;
      p.textContent = (sec === 'en-cn' ? '英译汉' : '名词解释') + ' (' + cnt + ')';
    }
  });
}

function resetAll() {
  historyStack = [];
  initQueue(currentSection);
  updateCard();
  updateStats();
  doneView.style.display = 'none';
  cardWrapper.style.display = 'block';
}

function reviewForgotten() {
  if (forgotten.size === 0) return;
  var reviewList = [];
  forgotten.forEach(function(idx) { reviewList.push(idx); });
  queue = shuffle(reviewList);
  currentIdx = 0;
  currentWordIdx = queue[0];
  mastered = new Set();
  forgotten = new Set();
  historyStack = [];
  isFlipped = false;
  card.classList.remove('flipped');
  updateCard();
  updateStats();
  doneView.style.display = 'none';
  cardWrapper.style.display = 'block';
}

function shuffleAll() {
  historyStack = [];
  queue = shuffle(filteredIndices.slice());
  currentIdx = 0;
  currentWordIdx = queue.length > 0 ? queue[0] : -1;
  isFlipped = false;
  card.classList.remove('flipped');
  mastered = new Set();
  forgotten = new Set();
  historyStack = [];
  updateCard();
  updateStats();
  doneView.style.display = 'none';
  cardWrapper.style.display = 'block';
}

// Modal functions
function openWordList() {
  document.getElementById('wordListModal').classList.add('open');
  renderWordList();
  setTimeout(function() {
    document.getElementById('wordSearch').focus();
  }, 100);
}
function closeWordList() {
  document.getElementById('wordListModal').classList.remove('open');
}

function renderWordList() {
  var query = document.getElementById('wordSearch').value.toLowerCase().trim();
  var container = document.getElementById('wordListContainer');
  var summary = document.getElementById('listSummary');
  var list = ALL_WORDS.filter(function(w, i) {
    if (currentSection !== 'all' && w.section !== currentSection) return false;
    if (!query) return true;
    return w.front.toLowerCase().includes(query) || w.back.toLowerCase().includes(query);
  });
  var masteredCount = 0;
  var forgottenCount = 0;
  list.forEach(function(w, i) {
    var idx = ALL_WORDS.indexOf(w);
    if (mastered.has(idx)) masteredCount++;
    if (forgotten.has(idx)) forgottenCount++;
  });
  summary.textContent = '共 ' + list.length + ' 个 · 已掌握 ' + masteredCount + ' 个 · 待复习 ' + forgottenCount + ' 个';
  if (list.length === 0) {
    container.innerHTML = '<div class="no-match">未找到匹配词汇</div>';
    return;
  }
  var html = '';
  list.forEach(function(w) {
    var idx = ALL_WORDS.indexOf(w);
    var status = '';
    var cls = '';
    if (mastered.has(idx)) {
      status = '<span class="status" style="color:var(--correct);font-size:0.85rem">✅</span>';
      cls = ' mastered';
    } else if (forgotten.has(idx)) {
      status = '<span class="status" style="color:#fbbf24;font-size:0.85rem">🔄</span>';
    } else {
      status = '<span class="status" style="color:var(--text-secondary);font-size:0.85rem">○</span>';
    }
    html += '<div class="word-row' + cls + '">' +
      status +
      '<span class="word-front">' + w.front.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</span>' +
      '<span class="word-back">' + w.back.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</span>' +
      '</div>';
  });
  container.innerHTML = html;
}

// Event listeners
document.getElementById('cardWrapper').addEventListener('click', function() {
  if (animating) return;
  isFlipped = !isFlipped;
  card.classList.toggle('flipped', isFlipped);
});

document.getElementById('btnFlip').addEventListener('click', function(e) {
  e.stopPropagation();
  if (animating) return;
  isFlipped = !isFlipped;
  card.classList.toggle('flipped', isFlipped);
});

document.getElementById('btnForgot').addEventListener('click', markForgot);
document.getElementById('btnRemember').addEventListener('click', markRemembered);
document.getElementById('btnBack').addEventListener('click', goBack);
document.getElementById('btnReset').addEventListener('click', resetAll);
document.getElementById('btnReview').addEventListener('click', reviewForgotten);
document.getElementById('btnShuffle').addEventListener('click', shuffleAll);
document.getElementById('btnWordList').addEventListener('click', openWordList);
document.getElementById('modalClose').addEventListener('click', closeWordList);
document.getElementById('wordListModal').addEventListener('click', function(e) {
  if (e.target === this) closeWordList();
});
document.getElementById('wordSearch').addEventListener('input', renderWordList);

// Section pills
document.querySelectorAll('.pill').forEach(function(p) {
  p.addEventListener('click', function() {
    switchSection(this.dataset.section);
  });
});

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (document.getElementById('wordListModal').classList.contains('open')) {
    if (e.key === 'Escape') { closeWordList(); e.preventDefault(); }
    return;
  }
  switch (e.key) {
    case ' ':
    case 'Enter':
      e.preventDefault();
      document.getElementById('btnFlip').click();
      break;
    case 'ArrowLeft':
      e.preventDefault();
      document.getElementById('btnForgot').click();
      break;
    case 'ArrowRight':
      e.preventDefault();
      document.getElementById('btnRemember').click();
      break;
    case 'ArrowUp':
      e.preventDefault();
      document.getElementById('btnBack').click();
      break;
    case 'r':
    case 'R':
      resetAll();
      break;
    case 'f':
    case 'F':
      reviewForgotten();
      break;
  }
});

// Initialize
initQueue('all');
updateCard();
updateStats();
updatePillCounts();
</script>
